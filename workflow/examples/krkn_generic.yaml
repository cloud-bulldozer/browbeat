name: "Generic krkn-hub Chaos Test"
description: "Run a custom krkn-hub scenario with full image control"

variables:
  kubeconfig_path: "~/.kube/config"
  namespace: "openstack"

steps:
  - name: "run-custom-chaos"
    operation: "krkn.run" 
    args:
      image: "quay.io/krkn-chaos/krkn-hub:pod-scenarios"
      kubeconfig: "{{ kubeconfig_path }}"
      env:
        NAMESPACE: "{{ namespace }}"
        POD_LABEL: "service=keystone"
        EXPECTED_POD_COUNT: "3"
        DISRUPTION_COUNT: "1"
    save_as: "chaos_result"
    timeout: 300
    on_failure: "fail"

  - name: "log-chaos-result"
    operation: "workflow.log"
    args:
      message: "Chaos test completed with rc={{ chaos_result.rc }}"
