name: "Pod Chaos with Nova Resilience Test"
description: "Boot a VM, run krkn pod chaos against nova-api, verify VM still accessible"

variables:
  kubeconfig_path: "~/.kube/config"
  namespace: "openstack"
  image_name: "cirros"
  flavor_name: "m1.tiny"

steps:
  - name: "boot-test-vm"
    operation: "nova.boot_server"
    args:
      image: "{{ image_name }}"
      flavor: "{{ flavor_name }}"
      name: "chaos-test-vm"
    save_as: "server"
    wait_for_status: "ACTIVE"
    wait_timeout: 300
    on_failure: "fail"

  - name: "log-vm-created"
    operation: "workflow.log"
    args:
      message: "VM {{ server.id }} is ACTIVE, starting chaos test"

  - name: "run-pod-chaos"
    operation: "krkn.pod_scenario"
    args:
      kubeconfig: "{{ kubeconfig_path }}"
      env:
        NAMESPACE: "{{ namespace }}"
        POD_LABEL: "service=nova-api"
        EXPECTED_POD_COUNT: "3"
        DISRUPTION_COUNT: "1"
    save_as: "chaos_result"
    timeout: 600
    on_failure: "continue"

  - name: "wait-for-recovery"
    operation: "workflow.wait"
    args:
      seconds: 30

  - name: "verify-vm-accessible"
    operation: "nova.show_server"
    args:
      server_id: "{{ server.id }}"
    save_as: "server_after_chaos"
    on_failure: "fail"

  - name: "log-result"
    operation: "workflow.log"
    args:
      message: "Post-chaos VM status: {{ server_after_chaos.status }}"

  - name: "cleanup-vm"
    operation: "nova.delete_server"
    args:
      server_id: "{{ server.id }}"
    on_failure: "continue"
