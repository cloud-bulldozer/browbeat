{% set image_name = image_name or 'cirro5' %}
{% set flavor_name = flavor_name or 'm1.tiny-cirros' %}
{% set username = username or 'cirros' %}
{% set ssh_timeout = ssh_timeout or 120 %}
{% set base_vlan = base_vlan or 100 %}
{% set provider_phys_net = provider_phys_net or 'datacentre' %}
{% set sla_max_avg_duration = sla_max_avg_duration or 60 %}
{% set sla_max_failure = sla_max_failure or 0 %}
{% set sla_max_seconds = sla_max_seconds or 60 %}
---
BrowbeatPlugin.create_provider_net_nova_boot_ping_ssh:
-
    args:
      flavor:
        name: '{{flavor_name}}'
      image:
        name: '{{image_name}}'
      username: '{{username}}'
      ssh_timeout: {{ssh_timeout}}
      provider_phys_net: '{{provider_phys_net}}'
      iface_name: '{{iface_name}}'
      base_vlan: {{base_vlan}}
      subnet_create_args: {}
    runner:
      concurrency: {{concurrency}}
      times: {{times}}
      type: "constant"
    context:
      users:
        tenants: 1
        users_per_tenant: 1
      quotas:
        neutron:
          network: -1
          port: -1
          router: -1
          subnet: -1
          floatingip: -1
        nova:
          instances: -1
          cores: -1
          ram: -1
    sla:
      max_avg_duration: {{sla_max_avg_duration}}
      max_seconds_per_iteration: {{sla_max_seconds}}
      failure_rate:
        max: {{sla_max_failure}}
